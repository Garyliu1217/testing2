<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HSBC 8% 永續債券 - 價格與到期收益率</title>
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a2a4f; font-size: 1.7rem; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #2c5a7a; font-size: 0.9rem; margin-bottom: 15px; }
        .update-badge { text-align: center; background: #e8f0fe; display: inline-block; width: auto; margin: 0 auto 20px; padding: 6px 18px; border-radius: 40px; font-size: 0.75rem; color: #004e92; }
        .instruction { text-align: center; background: #eef2fa; padding: 10px; border-radius: 32px; font-size: 0.8rem; margin-bottom: 25px; color: #1a2a4f; }
        .chart-container { margin-bottom: 28px; }
        .footer { text-align: center; font-size: 0.7rem; color: #6b7a8a; border-top: 1px solid #e0e8f0; padding-top: 18px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 HSBC 8% 永續債券</h1>
    <div class="subtitle">價格走勢 (上) 與 到期收益率 YTM (下)</div>
    <div style="text-align: center;">
        <div id="liveBadge" class="update-badge">🔄 正在從 Testing 試算表載入最新資料...</div>
    </div>
    <div class="instruction">🖱️ 滑鼠框選縮放／拖曳平移／雙擊還原 — 上下圖表「完美同步」</div>
    <div id="price-chart" class="chart-container"></div>
    <div id="ytm-chart" class="chart-container"></div>
    <div class="footer">✅ 資料每日自動同步：當你更新 Testing 試算表後，客戶重新整理此頁面即可看到最新圖表</div>
</div>

<script>
    // 使用你的 Testing 試算表 CSV 公開網址 (gid=0)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1FOgA8Z6jmY8pxtKDmath1eL6T1zTAwWD_nvZwbHsbyo/export?format=csv&gid=0";
    
    // 欄位名稱（請根據你的試算表實際名稱修改）
    const COL_DATE = "Date";
    const COL_PRICE = "Price";
    const COL_YTM = "YTM";
    
    function setUpdateTime(message) {
        const now = new Date();
        const formatted = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
        document.getElementById('liveBadge').innerHTML = `${message} ｜ 更新時間：${formatted}`;
    }
    function showError(msg) {
        document.getElementById('liveBadge').innerHTML = `❌ ${msg}`;
        console.error(msg);
    }
    
    function fetchAndPlot() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                console.log("解析完成，資料筆數:", results.data.length);
                if (!results.data || results.data.length === 0) {
                    showError("沒有讀取到任何資料，請確認試算表已公開。");
                    return;
                }
                let dates = [], prices = [], ytms = [];
                for (let i = 0; i < results.data.length; i++) {
                    const row = results.data[i];
                    const dateVal = row[COL_DATE];
                    const priceVal = row[COL_PRICE];
                    const ytmVal = row[COL_YTM];
                    if (!dateVal || dateVal.trim() === "") continue;
                    let priceNum = (priceVal !== undefined && priceVal !== "") ? parseFloat(priceVal) : null;
                    let ytmNum = (ytmVal !== undefined && ytmVal !== "") ? parseFloat(ytmVal) : null;
                    if (isNaN(priceNum)) priceNum = null;
                    if (isNaN(ytmNum)) ytmNum = null;
                    if (priceNum === null && ytmNum === null) continue;
                    dates.push(String(dateVal).trim());
                    prices.push(priceNum);
                    ytms.push(ytmNum);
                }
                if (dates.length === 0) {
                    showError("沒有有效的數值資料。請檢查欄位名稱是否為 Date, Price, YTM。");
                    return;
                }
                const priceTrace = {
                    x: dates, y: prices, mode: 'lines+markers', name: '價格 (USD)', type: 'scatter',
                    line: { color: '#1f77b4', width: 2.5 }, marker: { size: 6, color: '#1f77b4' },
                    hovertemplate: '<b>%{x}</b><br>價格: US$ %{y:.2f}<extra></extra>'
                };
                const priceLayout = {
                    title: { text: '📈 HSBC 8% Perps (Price)', font: { size: 16, weight: 'bold' } },
                    xaxis: { title: '日期', tickangle: -30, rangeslider: { visible: false }, showgrid: true, gridcolor: '#eef2f6' },
                    yaxis: { title: '價格 (USD)', tickprefix: '$', showgrid: true, gridcolor: '#eef2f6', zeroline: true, zerolinecolor: '#cccccc' },
                    height: 420, margin: { t: 50, l: 65, r: 40, b: 60 }, hovermode: 'x unified', dragmode: 'zoom', plot_bgcolor: '#ffffff', paper_bgcolor: '#ffffff'
                };
                const ytmTrace = {
                    x: dates, y: ytms, mode: 'lines+markers', name: '到期收益率 YTM (%)', type: 'scatter',
                    line: { color: '#ff7f0e', width: 2.5 }, marker: { size: 6, color: '#ff7f0e' },
                    hovertemplate: '<b>%{x}</b><br>YTM: %{y:.2f}%<extra></extra>'
                };
                const ytmLayout = {
                    title: { text: '📉 HSBC 8% Perps (YTM)', font: { size: 16, weight: 'bold' } },
                    xaxis: { title: '日期', tickangle: -30, showgrid: true, gridcolor: '#eef2f6' },
                    yaxis: { title: '收益率 (%)', ticksuffix: '%', showgrid: true, gridcolor: '#eef2f6', zeroline: true, zerolinecolor: '#cccccc' },
                    height: 400, margin: { t: 50, l: 65, r: 40, b: 60 }, hovermode: 'x unified', dragmode: 'zoom', plot_bgcolor: '#ffffff', paper_bgcolor: '#ffffff'
                };
                Plotly.newPlot('price-chart', [priceTrace], priceLayout);
                Plotly.newPlot('ytm-chart', [ytmTrace], ytmLayout);
                function syncXAxis(sourceId, targetId) {
                    const sourceDiv = document.getElementById(sourceId);
                    if (!sourceDiv) return;
                    sourceDiv.on('plotly_relayout', function() {
                        const src = sourceDiv.layout;
                        if (src.xaxis && src.xaxis.range && src.xaxis.range[0] && src.xaxis.range[1]) {
                            Plotly.relayout(targetId, { 'xaxis.range[0]': src.xaxis.range[0], 'xaxis.range[1]': src.xaxis.range[1] });
                        }
                    });
                }
                syncXAxis('price-chart', 'ytm-chart');
                syncXAxis('ytm-chart', 'price-chart');
                setUpdateTime("✅ 圖表已從 Testing 試算表同步");
            },
            error: function(err) { 
                console.error(err);
                showError("無法載入 CSV 檔案4，請確認試算表已公開為「知道連結的任何人可檢視」。"); 
            }
        });
    }
    fetchAndPlot();
</script>
</body>
</html>
